[workspace]
# PR-gated: release-plz only creates releases when you merge the Release PR
release_always = false
# mbgl-sys uses FFI/C++ — cargo-semver-checks produces false positives
semver_check = false
# Keep the default `release-plz-` branch prefix: release-plz detects Release
# PR merges by checking if the head branch starts with `release-plz-` (see
# release_always docs). Changing pr_branch_prefix breaks that detection and
# prevents `release-plz release` from tagging tileserver-rs after merge.
# lint-branch.yml has an allowlist entry for `^release-plz-` to permit the
# non-kebab UTC timestamp suffix that release-plz always appends.

# tileserver-rs: binary crate, GitHub Release only (no crates.io)
# `git_only = true` tells release-plz to compare against the git tag
# (v{{ version }}) instead of crates.io. Required because Cargo.toml sets
# `publish = false` → is_publishable() returns false → without git_only the
# updater skips the package entirely, producing `{"prs":[]}` silently.
# See release-plz-core/src/command/update/updater.rs:283-302.
[[package]]
name = "tileserver-rs"
publish = false
git_only = true
git_release_enable = true
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

# mbgl-sys: FFI crate, publishes to crates.io
[[package]]
name = "mbgl-sys"
publish = true
git_release_enable = true
git_tag_name = "mbgl-sys-v{{ version }}"
git_release_name = "mbgl-sys v{{ version }}"
publish_no_verify = true # C++ deps not available during cargo publish
