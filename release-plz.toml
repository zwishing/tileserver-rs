[workspace]
# PR-gated: release-plz only creates releases when you merge the Release PR
release_always = false
# mbgl-sys uses FFI/C++ — cargo-semver-checks produces false positives
semver_check = false
# Keep the default `release-plz-` branch prefix: release-plz detects Release
# PR merges by checking if the head branch starts with `release-plz-` (see
# release_always docs). Changing pr_branch_prefix breaks that detection and
# prevents `release-plz release` from tagging tileserver-rs after merge.
# lint-branch.yml has an allowlist entry for `^release-plz-` to permit the
# non-kebab UTC timestamp suffix that release-plz always appends.

# tileserver-rs: binary crate, GitHub Release only (no crates.io)
# `git_only = true` tells release-plz to compare against the git tag
# (v{{ version }}) instead of crates.io. Required because Cargo.toml sets
# `publish = false` → is_publishable() returns false → without git_only the
# updater skips the package entirely, producing `{"prs":[]}` silently.
# See release-plz-core/src/command/update/updater.rs:283-302.
[[package]]
name = "tileserver-rs"
publish = false
git_only = true
git_release_enable = true
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

# mbgl-sys: FFI crate excluded from release-plz processing.
#
# WHY: release-plz always runs `cargo package --verify` for workspace members
# when computing next-version diffs, even with `git_only = true` + `publish = false`.
# Because mbgl-sys's `build.rs` depends on pre-built MapLibre Native .a files
# (via MBGL_SYS_LIB_DIR or the `prebuilt` feature) that DO NOT exist inside
# cargo's isolated `--verify` tmpdir, verify fails mid-build and the whole
# release-plz update aborts with `{"prs":[]}`.
#
# Upstream bug: https://github.com/release-plz/release-plz/issues/2651
# ("git-only update fails for non-verifiable crates" — Feb 2026, unresolved).
# `publish_no_verify` does NOT fix this — it only affects `cargo publish`,
# not internal `cargo package --verify`. No `package_no_verify` option exists.
#
# WORKAROUND: exclude mbgl-sys from release-plz entirely via `release = false`.
# release-plz skips it (no version bump, no publish, no verify). We publish
# mbgl-sys manually on a tag push via `build-mbgl-native.yml`, which is fine
# because it rarely changes (every few months). When mbgl-sys bumps:
#   1. bump version in crates/mbgl-sys/Cargo.toml
#   2. commit + tag manually: `git tag mbgl-sys-vX.Y.Z && git push --tags`
#   3. `build-mbgl-native.yml` builds + publishes to crates.io + GitHub Release
#
# DO NOT SET `release = true` here until upstream #2651 is fixed.
[[package]]
name = "mbgl-sys"
release = false
