fonts = "./data/fonts"

[server]
host = "0.0.0.0"
port = 8901
cors_origins = ["*"]

[telemetry]
enabled = false

[cache]
enabled = true
max_size_mb = 256
ttl_seconds = 3600

[[sources]]
id = "pmtiles"
type = "pmtiles"
path = "./data/tiles/protomaps-sample.pmtiles"
name = "PMTiles Sample"
attribution = "© OpenStreetMap contributors"

[[sources]]
id = "mbtiles"
type = "mbtiles"
path = "./data/tiles/zurich_switzerland.mbtiles"
name = "Zurich MBTiles"
attribution = "© OpenStreetMap contributors"

[postgres]
connection_string = "postgresql://tileserver:tileserver@127.0.0.1:5432/tiles"
pool_size = 20
pool_wait_timeout_ms = 30000
pool_create_timeout_ms = 10000
pool_recycle_timeout_ms = 5000
pool_pre_warm = true

[postgres.cache]
size_mb = 256
ttl_seconds = 3600

[[postgres.functions]]
id = "benchmark_points"
schema = "public"
function = "get_benchmark_tiles"
name = "Benchmark Points"
minzoom = 0
maxzoom = 14
bounds = [8.45, 47.32, 8.63, 47.44]

[[postgres.functions]]
id = "filtered_points"
schema = "public"
function = "get_filtered_tiles"
name = "Filtered Points"
minzoom = 0
maxzoom = 14
bounds = [8.45, 47.32, 8.63, 47.44]

[[postgres.tables]]
id = "benchmark_table"
schema = "public"
table = "benchmark_points"
geometry_column = "geom"
id_column = "id"
properties = ["name", "category"]
name = "Benchmark Points (Table Source)"
minzoom = 0
maxzoom = 14
bounds = [8.45, 47.32, 8.63, 47.44]

[[postgres.tables]]
id = "cities"
schema = "public"
table = "cities"
geometry_column = "geom"
id_column = "id"
srid = 4326
writable = true

[[postgres.tables]]
id = "countries"
schema = "public"
table = "countries"
geometry_column = "geom"
id_column = "id"
srid = 4326

[[postgres.tables]]
id = "roads"
schema = "public"
table = "roads"
geometry_column = "geom"
id_column = "id"
srid = 4326

[[sources]]
id = "cog-rgb"
type = "cog"
path = "./data/raster/benchmark-rgb.cog.tif"
name = "Benchmark RGB COG"
attribution = "© tileserver-rs benchmarks"

[[sources]]
id = "sentinel2-static"
type = "stac"
path = "https://earth-search.aws.element84.com/v1"
name = "Sentinel-2 Static (benchmark)"
collection = "sentinel-2-l2a"
asset_role = "visual"
dynamic = false
max_items = 1
stac_bbox = [6.0, 43.0, 10.0, 46.0]

[[sources]]
id = "sentinel2-dynamic"
type = "stac"
path = "https://earth-search.aws.element84.com/v1"
name = "Sentinel-2 Dynamic (benchmark)"
collection = "sentinel-2-l2a"
asset_role = "visual"
dynamic = true
max_items = 3
stac_bbox = [6.0, 43.0, 10.0, 46.0]

[[styles]]
id = "sentinel2-static"
path = "./data/styles/sentinel2/style.json"
name = "Sentinel-2 Static"

[[styles]]
id = "sentinel2-dynamic"
path = "./data/styles/sentinel2-dynamic/style.json"
name = "Sentinel-2 Dynamic"
