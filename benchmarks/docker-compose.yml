# Docker Compose for benchmark comparison
#
# All servers run in Docker for fair apples-to-apples comparison.
#
# Ports:
# - tileserver-gl: http://127.0.0.1:8900
# - tileserver-rs: http://127.0.0.1:8901
# - martin:        http://127.0.0.1:8902
# - titiler:       http://127.0.0.1:8903
# - postgres:      127.0.0.1:5432
#
# Build tileserver-rs first:
#   docker build -t tileserver-rs:latest .
#
# Run all servers:
#   docker compose -f benchmarks/docker-compose.yml up -d
#
# Run benchmarks:
#   node benchmarks/run-benchmarks.js

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: tileserver
      POSTGRES_PASSWORD: tileserver
      POSTGRES_DB: tiles
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/init-ogc.sql:/docker-entrypoint-initdb.d/init-ogc.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tileserver -d tiles"]
      interval: 5s
      timeout: 3s
      retries: 10

  tileserver-gl:
    image: maptiler/tileserver-gl:latest
    ports:
      - "8900:8080"
    volumes:
      - ../data/tiles:/data:ro
      - ../data/fonts:/fonts:ro
      - ./tileserver-gl-config.json:/config.json:ro
      - ./tileserver-gl-style.json:/protomaps-light.json:ro
    command: ["-p", "8080", "-c", "/config.json"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  tileserver-rs:
    image: tileserver-rs:latest
    ports:
      - "8901:8080"
    volumes:
      - ../data:/data:ro
      - ./config.docker.toml:/app/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full
      - all

  tileserver-rs-raster:
    image: ghcr.io/vinayakkulkarni/tileserver-rs:2.19.0
    # 8904 to avoid collision with tileserver-rs (8901); the two services
    # can now coexist in the same `docker compose up` invocation and the
    # harness picks the right endpoint via run-benchmarks.js config.
    ports:
      - "8904:8080"
    volumes:
      - ../data:/data:ro
      - ../configs/benchmark-raster.toml:/app/config.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  martin:
    image: ghcr.io/maplibre/martin:latest
    ports:
      - "8902:3000"
    volumes:
      - ../data/tiles:/data:ro
    environment:
      DATABASE_URL: postgresql://tileserver:tileserver@postgres:5432/tiles
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "/data/zurich_switzerland.mbtiles"
      - "/data/protomaps-sample.pmtiles"
      - "--auto-bounds"
      - "calc"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/catalog"]
      interval: 5s
      timeout: 3s
      retries: 3

  titiler:
    platform: linux/amd64
    image: ghcr.io/developmentseed/titiler:latest
    container_name: benchmarks-titiler
    ports:
      - "8903:8000"
    environment:
      - GDAL_CACHEMAX=75%
      - VSI_CACHE=TRUE
      - VSI_CACHE_SIZE=536870912
      - GDAL_HTTP_MERGE_CONSECUTIVE_RANGES=YES
      - GDAL_HTTP_MULTIPLEX=YES
      - GDAL_HTTP_VERSION=2
      - GDAL_DISABLE_READDIR_ON_OPEN=EMPTY_DIR
      - TITILER_API_TELEMETRY_ENABLED=False
      - RIO_TILER_MAX_THREADS=4
    volumes:
      - ../data/raster:/data/raster:ro
    command: ["uvicorn", "titiler.application.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    restart: unless-stopped
    profiles:
      - titiler
      - all

volumes:
  postgres_data:

