coverage:
  status:
    project:
      default:
        target: 65%
        threshold: 1%
        if_not_found: success
    patch:
      default:
        target: 75%
        threshold: 5%
        if_not_found: success

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "crates/mbgl-sys/vendor/**"
  - "crates/mbgl-sys/cpp/**"
  - "**/tests/**"
  - "**/benches/**"
  - "apps/**"
