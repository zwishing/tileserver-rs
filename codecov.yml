coverage:
  precision: 2
  round: down
  range: 60..80

  status:
    project:
      default:
        # Codecov reports REGION coverage by default (not line coverage).
        # Local `cargo llvm-cov report` shows: lines=65.80%, regions=64.06%.
        # Codecov's project% matches the regions number, so target floor sits
        # at 64% (above current 64.03%, below 65% wall to leave headroom).
        # Stretch ladder: bump to 66% once raster mosaic methods + cog source
        # gain DB-fixture integration tests (follow-up PR).
        target: 64%
        threshold: 1%
        if_not_found: success
    patch:
      default:
        # New code must hit 75% region coverage. This is the disciplinary
        # gate that bends the project% curve toward the 75% stretch goal
        # organically (every PR moves the floor up).
        target: 75%
        threshold: 5%
        if_not_found: success

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "crates/mbgl-sys/vendor/**"
  - "crates/mbgl-sys/cpp/**"
  - "**/tests/**"
  - "**/benches/**"
  - "apps/**"
