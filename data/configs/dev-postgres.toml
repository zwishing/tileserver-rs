# Development config for tileserver-rs with postgres + STAC sources.
# Spin up the companion dev database with:
#   docker compose -f deploy/local/compose.yml -f deploy/local/compose.override.yml up -d postgres-dev
# Start the server with:
#   cargo run --features postgres,raster,stac,frontend -- --config data/configs/dev-postgres.toml

fonts = "./data/fonts"

[server]
host = "0.0.0.0"
port = 8080
cors_origins = ["*"]

[telemetry]
enabled = false

[cache]
enabled = true
max_size_mb = 256
ttl_seconds = 3600

[postgres]
connection_string = "postgresql://tileserver:tileserver@127.0.0.1:5432/gis"
pool_size = 8

[[postgres.tables]]
id = "cities"
schema = "public"
table = "cities"
geometry_column = "geom"
id_column = "id"
srid = 4326
writable = true

[[postgres.tables]]
id = "countries"
schema = "public"
table = "countries"
geometry_column = "geom"
id_column = "id"
srid = 4326

[[postgres.tables]]
id = "roads"
schema = "public"
table = "roads"
geometry_column = "geom"
id_column = "id"
srid = 4326

[[postgres.tables]]
id = "buildings"
schema = "public"
table = "buildings"
geometry_column = "geom"
id_column = "id"
srid = 4326

[[sources]]
id = "protomaps"
type = "pmtiles"
path = "./data/tiles/protomaps-sample.pmtiles"
name = "Protomaps Firenze Sample"
attribution = "<a href=\"https://protomaps.com\">Protomaps</a> | <a href=\"https://openstreetmap.org/copyright\">© OpenStreetMap</a>"

# stac_bbox anchors Phase 1 discovery + sets source bounds (prevents Element84 from defaulting to
# whatever is first in its index, e.g. Hudson Bay). Order: [west, south, east, north] in WGS84.
[[sources]]
id = "sentinel2"
type = "stac"
path = "https://earth-search.aws.element84.com/v1"
name = "Sentinel-2 L2A (Phase 1: static, first asset)"
collection = "sentinel-2-l2a"
asset_role = "visual"
dynamic = false
max_items = 25
stac_bbox = [6.0, 43.0, 10.0, 46.0]

[[sources]]
id = "sentinel2-dynamic"
type = "stac"
path = "https://earth-search.aws.element84.com/v1"
name = "Sentinel-2 L2A (Phase 2/3: dynamic + mosaic)"
collection = "sentinel-2-l2a"
asset_role = "visual"
dynamic = true
max_items = 5
stac_bbox = [6.0, 43.0, 10.0, 46.0]

[[styles]]
id = "protomaps-light"
path = "./data/styles/protomaps-light/style.json"
name = "Protomaps Light"

[[styles]]
id = "postgis-collections"
path = "./data/styles/postgis-collections/style.json"
name = "PostGIS OGC Collections"

[[styles]]
id = "sentinel2"
path = "./data/styles/sentinel2/style.json"
name = "Sentinel-2 L2A Imagery (static)"

[[styles]]
id = "sentinel2-dynamic"
path = "./data/styles/sentinel2-dynamic/style.json"
name = "Sentinel-2 L2A Dynamic Mosaic"
