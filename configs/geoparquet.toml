# GeoParquet test configuration
# Requires: cargo build --features geoparquet
# Usage: cargo run --features geoparquet -- --config configs/geoparquet.toml

[server]
host = "127.0.0.1"
port = 3030
cors_origins = ["*"]

[telemetry]
enabled = false

[[sources]]
id = "overture-places"
type = "geoparquet"
path = "/Users/vinayak/dev/personal/map/geolith/geolith/data/overture/theme=places/type=place/part-00000-308cb36d-c529-4dc2-83bb-fe6b282a2b1a-c000.zstd.parquet"
name = "Overture Places"
layer_name = "places"
minzoom = 0
maxzoom = 14

[[sources]]
id = "overture-divisions"
type = "geoparquet"
path = "/Users/vinayak/dev/personal/map/geolith/geolith/data/overture/theme=divisions/type=division/part-00000-ec2b4cda-aff9-4620-a9a0-159f8a8b0b31-c000.zstd.parquet"
name = "Overture Divisions"
layer_name = "divisions"
minzoom = 0
maxzoom = 14

[[styles]]
id = "overture-places"
path = "./data/styles/overture-places/style.json"
name = "Overture Places"

[[styles]]
id = "overture-divisions"
