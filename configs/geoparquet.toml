# GeoParquet test configuration
# Requires: cargo build --features geoparquet
# Usage: cargo run --features geoparquet -- --config configs/geoparquet.toml
#
# Download sample data:
#   pip install overturemaps
#   overturemaps download --bbox=-99.5,19.2,-98.9,19.6 -f geoparquet --type=place -o ./data/tiles/places.parquet
#   overturemaps download --bbox=-99.5,19.2,-98.9,19.6 -f geoparquet --type=division -o ./data/tiles/divisions.parquet

[server]
host = "127.0.0.1"
port = 3030
cors_origins = ["*"]

[telemetry]
enabled = false

[[sources]]
id = "overture-places"
type = "geoparquet"
path = "./data/tiles/places.parquet"
name = "Overture Places"
layer_name = "places"
minzoom = 0
maxzoom = 14

[[sources]]
id = "overture-divisions"
type = "geoparquet"
path = "./data/tiles/divisions.parquet"
name = "Overture Divisions"
layer_name = "divisions"
minzoom = 0
maxzoom = 14

[[styles]]
id = "overture-places"
path = "./data/styles/overture-places/style.json"
name = "Overture Places"

[[styles]]
id = "overture-divisions"
path = "./data/styles/overture-divisions/style.json"
name = "Overture Divisions"
