# GeoParquet test configuration
# Requires: cargo build --features geoparquet
# Usage: cargo run --features geoparquet -- --config configs/geoparquet.toml

[server]
host = "127.0.0.1"
port = 3030
cors_origins = ["*"]

[telemetry]
enabled = false

# Overture Places (~73M features, ~7.2 GB)
# Single partition file for quick testing
[[sources]]
id = "overture-places"
type = "geoparquet"
path = "/Users/vinayak/dev/personal/map/geolith/geolith/data/overture/theme=places/type=place/part-00000-308cb36d-c529-4dc2-83bb-fe6b282a2b1a-c000.zstd.parquet"
name = "Overture Places"
layer_name = "places"
minzoom = 0
maxzoom = 14

# Overture Divisions (~936 MB)
[[sources]]
id = "overture-divisions"
type = "geoparquet"
path = "/Users/vinayak/dev/personal/map/geolith/geolith/data/overture/theme=divisions/type=division/part-00000-0d42f10d-1d86-4580-b978-42489d818272-c000.zstd.parquet"
name = "Overture Divisions"
layer_name = "divisions"
minzoom = 0
maxzoom = 14
