name: "Release Docker Images"

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (e.g., v2.4.0)"
        required: false
        type: string

concurrency:
  group: release-docker-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-assets:
    name: Verify mbgl-sys assets exist
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          sparse-checkout: crates/mbgl-sys/Cargo.toml

      - name: Check mbgl-sys release assets
        run: |
          MBGL_VERSION=$(grep '^version' crates/mbgl-sys/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          for TARGET in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            URL="https://github.com/${{ github.repository }}/releases/download/mbgl-sys-v${MBGL_VERSION}/mbgl-native-${TARGET}.tar.gz"
            STATUS=$(curl -sI -o /dev/null -w '%{http_code}' "$URL")
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
              echo "mbgl-sys v${MBGL_VERSION} asset not found for ${TARGET} (HTTP ${STATUS})"
              echo "build-mbgl-native.yml is likely still building — this run will be retried via workflow_dispatch after assets are uploaded"
              exit 1
            fi
            echo "mbgl-sys v${MBGL_VERSION} asset for ${TARGET}: OK"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.platform }} (${{ matrix.variant }})
    needs: [check-assets]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full builds (with embedded frontend)
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            variant: full
            features: frontend geoparquet
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            variant: full
            features: frontend geoparquet
          # Headless builds (no frontend, server-only)
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
            variant: headless
            features: ''
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
            variant: headless
            features: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: FEATURES=${{ matrix.features }}
          push: ${{ github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/') }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}-${{ matrix.variant }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Export digest
        if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create Multi-Arch Manifest (Full)
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-full-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version from tag
        id: version
        if: inputs.tag != ''
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ inputs.tag != '' }}
            type=raw,value=${{ steps.version.outputs.minor }},enable=${{ inputs.tag != '' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ inputs.tag != '' && !startsWith(inputs.tag, 'v0.') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  merge-headless:
    name: Create Multi-Arch Manifest (Headless)
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || startsWith(github.ref, 'refs/tags/')
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-headless-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version from tag
        id: version
        if: inputs.tag != ''
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=branch,suffix=-headless
            type=semver,pattern={{version}},suffix=-headless
            type=semver,pattern={{major}}.{{minor}},suffix=-headless
            type=semver,pattern={{major}},suffix=-headless,enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,suffix=-headless
            type=raw,value=latest-headless,enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ steps.version.outputs.version }}-headless,enable=${{ inputs.tag != '' }}
            type=raw,value=${{ steps.version.outputs.minor }}-headless,enable=${{ inputs.tag != '' }}
            type=raw,value=${{ steps.version.outputs.major }}-headless,enable=${{ inputs.tag != '' && !startsWith(inputs.tag, 'v0.') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
