name: "Release (Linux)"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v2.4.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.arch }} (${{ matrix.variant }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            target: x86_64-unknown-linux-gnu
            variant: full
            features: frontend
          - runner: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
            variant: full
            features: frontend
          - runner: ubuntu-latest
            arch: amd64
            target: x86_64-unknown-linux-gnu
            variant: headless
            features: ''
          - runner: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
            variant: headless
            features: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Bun
        if: matrix.variant == 'full'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: matrix.variant == 'full'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Bun dependencies
        if: matrix.variant == 'full'
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            libclang-dev \
            cmake \
            ninja-build \
            ccache \
            pkg-config \
            libcurl4-openssl-dev \
            libglfw3-dev \
            libuv1-dev \
            libpng-dev \
            libicu-dev \
            libjpeg-turbo8-dev \
            libwebp-dev \
            libsqlite3-dev \
            libopengl-dev \
            libgl-dev \
            libgdal-dev

      - name: Cache MapLibre Native build
        uses: actions/cache@v5
        with:
          path: maplibre-native-sys/vendor/maplibre-native/build-linux-opengl
          key: maplibre-linux-${{ matrix.arch }}-${{ hashFiles('maplibre-native-sys/vendor/maplibre-native/CMakeLists.txt') }}
          restore-keys: maplibre-linux-${{ matrix.arch }}-

      - name: Build MapLibre Native
        run: |
          cd maplibre-native-sys/vendor/maplibre-native
          if [ ! -f "build-linux-opengl/libmbgl-core.a" ]; then
            echo "Building MapLibre Native..."
            cmake --preset linux-opengl \
              -DCMAKE_BUILD_TYPE=Release \
              -DMLN_WITH_WERROR=OFF
            cmake --build build-linux-opengl --target mbgl-core mlt-cpp -j$(nproc)
          else
            echo "Using cached MapLibre Native build"
          fi

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-${{ matrix.arch }}-${{ matrix.variant }}

      - name: Install dependencies
        if: matrix.variant == 'full'
        run: bun install --frozen-lockfile

      - name: Build client
        if: matrix.variant == 'full'
        run: |
          ulimit -s unlimited 2>/dev/null || true
          cd apps/client
          npx nuxi generate
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Build Rust binary
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --features "${{ matrix.features }}"
          else
            cargo build --release
          fi

      - name: Prepare release
        run: |
          SUFFIX="${{ matrix.variant == 'headless' && '-headless' || '' }}"
          ARTIFACT_NAME="tileserver-rs-${{ matrix.target }}${SUFFIX}"
          mkdir -p dist
          cp target/release/tileserver-rs dist/tileserver-rs
          chmod +x dist/tileserver-rs
          cd dist
          tar -czvf "${ARTIFACT_NAME}.tar.gz" tileserver-rs
          sha256sum "${ARTIFACT_NAME}.tar.gz" > "${ARTIFACT_NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tileserver-rs-${{ matrix.target }}${{ matrix.variant == 'headless' && '-headless' || '' }}
          path: |
            dist/tileserver-rs-${{ matrix.target }}${{ matrix.variant == 'headless' && '-headless' || '' }}.tar.gz
            dist/tileserver-rs-${{ matrix.target }}${{ matrix.variant == 'headless' && '-headless' || '' }}.tar.gz.sha256
          retention-days: 30

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/tileserver-rs-${{ matrix.target }}${{ matrix.variant == 'headless' && '-headless' || '' }}.tar.gz
            dist/tileserver-rs-${{ matrix.target }}${{ matrix.variant == 'headless' && '-headless' || '' }}.tar.gz.sha256
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-alpha') || contains(github.event.inputs.tag || github.ref_name, '-beta') || contains(github.event.inputs.tag || github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
