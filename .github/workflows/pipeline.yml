name: 'The Pipeline'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, edited]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  deployments: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extract-branch:
    name: 'Fetch branch'
    runs-on: ubuntu-latest
    outputs:
      current_branch: ${{ steps.get-branch.outputs.current_branch }}
    steps:
      - name: Extract branch name
        id: get-branch
        run: echo "current_branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

  lint-branch:
    name: 'Lint branch'
    needs: [extract-branch]
    if: github.event_name == 'pull_request' && github.event.action != 'edited'
    uses: ./.github/workflows/lint-branch.yml

  lint-pr:
    name: 'Lint PR'
    needs: [extract-branch]
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/lint-pr.yml
    secrets: inherit

  ci-node:
    name: 'CI (Node)'
    needs: [extract-branch, lint-branch, lint-pr]
    if: |
      always() &&
      github.event.action != 'edited' &&
      (needs.lint-branch.result == 'success' || needs.lint-branch.result == 'skipped') &&
      (needs.lint-pr.result == 'success' || needs.lint-pr.result == 'skipped')
    uses: ./.github/workflows/ci-node.yml

  ci-rust:
    name: 'CI (Rust)'
    needs: [extract-branch, lint-branch, lint-pr]
    if: |
      always() &&
      github.event.action != 'edited' &&
      (needs.lint-branch.result == 'success' || needs.lint-branch.result == 'skipped') &&
      (needs.lint-pr.result == 'success' || needs.lint-pr.result == 'skipped')
    uses: ./.github/workflows/ci-rust.yml

  coverage:
    name: 'Coverage (Rust)'
    needs: [ci-rust]
    if: |
      always() &&
      needs.ci-rust.result == 'success'
    uses: ./.github/workflows/coverage.yml
    secrets: inherit
