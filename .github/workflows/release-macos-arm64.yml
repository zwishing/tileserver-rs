name: "Release (macOS ARM64)"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v2.4.0)"
        required: true
        type: string

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS ARM64
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install build dependencies
        run: brew install libuv pkg-config gdal

      - name: Download pre-built MapLibre Native
        run: |
          MBGL_VERSION=$(jq -r '.["crates/mbgl-sys"]' .release-please-manifest.json)
          URL="https://github.com/${{ github.repository }}/releases/download/mbgl-sys-v${MBGL_VERSION}/mbgl-native-aarch64-apple-darwin.tar.gz"
          echo "Downloading mbgl-sys v${MBGL_VERSION} for aarch64-apple-darwin..."

          MAX_RETRIES=5
          DELAY=60
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -fSL "$URL" | tar xz; then
              echo "✅ Download successful"
              ls -lh lib/
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "⏳ Attempt $i/$MAX_RETRIES failed, waiting ${DELAY}s before retry..."
              sleep $DELAY
            fi
          done
          echo "❌ Failed to download native binaries after $MAX_RETRIES attempts"
          exit 1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-arm64

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build client
        run: |
          ulimit -s unlimited 2>/dev/null || true
          cd apps/client
          npx nuxi generate
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Build Rust binary
        run: cargo build --release --target aarch64-apple-darwin --features frontend
        env:
          MBGL_SYS_LIB_DIR: ${{ github.workspace }}/lib

      - name: Prepare release
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/tileserver-rs dist/tileserver-rs
          chmod +x dist/tileserver-rs
          cd dist
          tar -czvf tileserver-rs-aarch64-apple-darwin.tar.gz tileserver-rs
          shasum -a 256 tileserver-rs-aarch64-apple-darwin.tar.gz > tileserver-rs-aarch64-apple-darwin.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tileserver-rs-aarch64-apple-darwin
          path: |
            dist/tileserver-rs-aarch64-apple-darwin.tar.gz
            dist/tileserver-rs-aarch64-apple-darwin.tar.gz.sha256
          retention-days: 30

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/tileserver-rs-aarch64-apple-darwin.tar.gz
            dist/tileserver-rs-aarch64-apple-darwin.tar.gz.sha256
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-alpha') || contains(github.event.inputs.tag || github.ref_name, '-beta') || contains(github.event.inputs.tag || github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


