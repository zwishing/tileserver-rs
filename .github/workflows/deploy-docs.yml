name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'apps/docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-docs-${{ hashFiles('apps/docs/bun.lock', 'apps/docs/package.json') }}
          restore-keys: ${{ runner.os }}-bun-docs-

      - name: Install dependencies
        working-directory: apps/docs
        run: bun install --frozen-lockfile

      - name: Build docs
        working-directory: apps/docs
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "Build attempt $attempt/$max_attempts..."
            if bun run build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Build failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "Build failed after $max_attempts attempts"
          exit 1
        env:
          NITRO_PRESET: cloudflare-pages

      - name: Deploy to Cloudflare Pages
        working-directory: apps/docs
        run: bunx wrangler pages deploy dist --project-name=tileserver-rs-docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
