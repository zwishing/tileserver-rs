name: 'Continuous Integration (Rust)'

on:
  workflow_call:

env:
  CI: 1
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RUST_LOG: '0'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  ci:
    name: 'Clippy, Check, Test & Build'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RUST_LOG: 'debug'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libclang-dev \
            libgdal-dev \
            libcurl4-openssl-dev \
            libglfw3-dev \
            libuv1-dev \
            libpng-dev \
            libicu-dev \
            libjpeg-turbo8-dev \
            libwebp-dev \
            libsqlite3-dev \
            libopengl-dev \
            libgl-dev \
            libegl-dev \
            libx11-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: |
          ulimit -s unlimited 2>/dev/null || true
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "Build attempt $attempt/$max_attempts..."
            if pnpm --filter @tileserver-rs/client run build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Build failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "Build failed after $max_attempts attempts"
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Free disk space for cargo cache
        run: rm -rf ~/.cargo/registry/src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Only save cache on main to prevent branch cache bloat (3.4GB+)
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Share cache across all branches
          shared-key: rust-ci
          # Don't cache build targets (saves ~2GB)
          cache-targets: false

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all --all-features
