name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_mbgl_sys:
        description: 'Publish mbgl-sys to crates.io'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-mbgl-sys:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.publish_mbgl_sys)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish mbgl-sys to crates.io
        run: |
          set -euo pipefail

          # Step 1: Get GitHub OIDC token with crates.io audience
          OIDC_TOKEN=$(curl -sLS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://crates.io" \
            -H "User-Agent: actions/oidc-client" \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" | jq -r '.value')

          if [ -z "${OIDC_TOKEN}" ] || [ "${OIDC_TOKEN}" = "null" ]; then
            echo "::error::Failed to obtain OIDC token from GitHub"
            exit 1
          fi

          # Step 2: Exchange OIDC token for crates.io publish token (POST with JSON body)
          EXCHANGE_RESPONSE=$(curl -sLS -X POST 'https://crates.io/api/v1/tokens/trusted-publishing' \
            -H 'Content-Type: application/json' \
            -d "{\"jwt\": \"${OIDC_TOKEN}\"}")
          CARGO_REGISTRY_TOKEN=$(echo "${EXCHANGE_RESPONSE}" | jq -r '.token')

          if [ -z "${CARGO_REGISTRY_TOKEN}" ] || [ "${CARGO_REGISTRY_TOKEN}" = "null" ]; then
            echo "::error::Failed to exchange OIDC token for crates.io token"
            echo "::error::Response: ${EXCHANGE_RESPONSE}"
            exit 1
          fi

          # Step 3: Publish
          export CARGO_REGISTRY_TOKEN
          cargo publish -p mbgl-sys

