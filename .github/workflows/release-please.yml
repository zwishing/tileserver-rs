name: Release Please

# Manages two independent release trains via `separate-pull-requests: true`
# in release-please-config.json — each package gets its OWN release PR, only
# when it has pending commits:
#
# 1. tileserver-rs (root crate)
#    - Release PR title: "chore(main): release tileserver-rs X.Y.Z"
#    - Merge → pushes `vX.Y.Z` tag → triggers:
#        release-linux-binaries.yml
#        release-macos-binaries.yml
#        release-docker-images.yml
#        release-sample-data.yml
#        release-homebrew.yml (chains after macOS + Linux via workflow_run)
#
# 2. mbgl-sys (FFI crate)
#    - Release PR title: "chore(main): release mbgl-sys X.Y.Z"
#    - Merge → pushes `mbgl-sys-vX.Y.Z` tag → triggers build-mbgl-native.yml
#      which builds platform-native .a libraries and uploads them as assets
#      on the mbgl-sys-vX.Y.Z GitHub Release. Not published to crates.io
#      (tileserver-rs has publish = false, so no crates.io dep chain needed).
#
# release-please bumps each package only when commit messages reference its
# path (scoped commits). With separate-pull-requests, a commit touching only
# crates/mbgl-sys opens just the mbgl-sys PR; a commit touching only
# crates/tileserver-rs (or apps/) opens just the tileserver-rs PR. When both
# have pending changes, TWO separate PRs open (pre-2026-04-23 behavior grouped
# both into one PR titled "chore: release main" — see PR #819 closed for the
# transition).
#
# We tried release-plz in Apr 2026 but abandoned it because its internal
# `cargo package --workspace --verify` fails on mbgl-sys's FFI build.rs
# (upstream release-plz#2651). release-please never invokes cargo, so it
# sidesteps the problem entirely.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'vinayakkulkarni'
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
