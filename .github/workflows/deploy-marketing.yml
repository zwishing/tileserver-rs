name: Deploy Marketing Site

on:
  push:
    branches:
      - main
    paths:
      - 'apps/marketing/**'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch:

concurrency:
  group: deploy-marketing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.0-rc.5
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build marketing site
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "Build attempt $attempt/$max_attempts..."
            if pnpm --filter @tileserver-rs/marketing run build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Build failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "Build failed after $max_attempts attempts"
          exit 1
        env:
          NITRO_PRESET: cloudflare-pages

      - name: Deploy to Cloudflare Pages
        working-directory: apps/marketing
        run: pnpm dlx wrangler pages deploy dist --project-name=tileserver-marketing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
