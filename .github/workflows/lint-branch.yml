name: Lint Branch Name

on:
  workflow_call:

jobs:
  validate-branch-name:
    name: Validate branch name
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check branch name
        run: |
          branch="${{ github.head_ref }}"
          pattern="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)/[a-z0-9]+(-[a-z0-9]+)*$"

          if [[ ! "$branch" =~ $pattern ]]; then
            echo "❌ Invalid branch name: '$branch'"
            echo ""
            echo "Branch names must follow the pattern:"
            echo "  <type>/<kebab-case-description>"
            echo ""
            echo "Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo ""
            echo "Rules:"
            echo "  - Lowercase only"
            echo "  - Words separated by hyphens"
            echo "  - No 'origin/' prefix"
            echo "  - No slashes in the description"
            echo ""
            echo "Examples:"
            echo "  ✅  chore/format-and-lint"
            echo "  ✅  feat/add-hero-section"
            echo "  ✅  fix/contact-form-validation"
            echo "  ❌  origin/chore/formatandlint  (has 'origin/' prefix)"
            echo "  ❌  feature/AddHeroSection      (unknown type, camelCase)"
            echo "  ❌  chore/format_and_lint        (underscores not allowed)"
            exit 1
          fi

          echo "✅ Branch name '$branch' is valid."
