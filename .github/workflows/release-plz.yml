name: Release-plz

on:
  push:
    branches: [main]

permissions: {}

jobs:
  # Job 1: Create/update the Release PR with version bumps + changelog.
  #
  # release-plz internally runs `cargo package --workspace` with the default
  # verify step enabled. Verify compiles the packaged crates in an isolated
  # directory, which links mbgl-sys against MapLibre Native. A plain ubuntu
  # runner has neither the prebuilt `.a` files nor the C++ system libs, so
  # the verify step fails with `ERROR failed to update pkgs`. We supply the
  # same mbgl-native binaries release-linux-binaries.yml uses so verify
  # succeeds without re-building MapLibre Native from source (~30 min).
  release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    if: github.repository_owner == 'vinayakkulkarni'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install MapLibre Native system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libuv1-dev \
            libpng-dev \
            libicu-dev \
            libjpeg-turbo8-dev \
            libwebp-dev \
            libsqlite3-dev \
            libopengl-dev \
            libgl-dev \
            libgdal-dev

      - name: Download pre-built MapLibre Native binaries
        run: |
          MBGL_VERSION=$(grep '^version' crates/mbgl-sys/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TARGET=x86_64-unknown-linux-gnu
          URL="https://github.com/${{ github.repository }}/releases/download/mbgl-sys-v${MBGL_VERSION}/mbgl-native-${TARGET}.tar.gz"
          echo "Downloading mbgl-sys v${MBGL_VERSION} for ${TARGET}..."

          MAX_RETRIES=5
          DELAY=60
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -fSL "$URL" | tar xz; then
              echo "Download successful"
              ls -lh lib/
              echo "MBGL_SYS_LIB_DIR=$(pwd)/lib" >> "$GITHUB_ENV"
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $i/$MAX_RETRIES failed, waiting ${DELAY}s before retry..."
              sleep $DELAY
            fi
          done
          echo "Failed to download native binaries after $MAX_RETRIES attempts"
          echo "build-mbgl-native.yml may still be running; this job will re-run on the next main push."
          exit 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ──────────────────────────────────────────────────────────────────
      # Run release-plz release-pr directly instead of via
      # release-plz/action@v0.5.
      #
      # WHY: The upstream action's composite shell-step intentionally
      # swallows any stderr containing the substring "422" and rewrites
      # the output to `{"prs":[]}` (see its action.yml:171-178). That
      # silences legitimate PR-creation failures — the wrapper cannot
      # distinguish between a genuine "nothing to release" 422 and a
      # "PAT-scope-too-narrow" 422. We do our own invocation so the
      # actual GitHub error body surfaces in the job log.
      #
      # If a future release-plz/action version fixes this swallow
      # (see https://github.com/release-plz/action/blob/main/action.yml),
      # this step can be reverted to `uses: release-plz/action@vX`.
      # ──────────────────────────────────────────────────────────────────
      - name: Install release-plz CLI
        uses: cargo-bins/cargo-binstall@main
      - name: Install release-plz binary
        shell: bash
        run: cargo binstall --no-confirm release-plz@0.3.157

      - name: Run release-plz release-pr (direct, no 422 swallow)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          release-plz release-pr \
            --git-token "${GITHUB_TOKEN}" \
            --repo-url "https://github.com/${GITHUB_REPOSITORY}" \
            --forge github \
            -o json

  # Job 2: When a Release PR is merged, create tags + GitHub Releases + publish crates.
  # With release_always = false, this only acts when the triggering commit
  # comes from a merged release-plz PR. Otherwise it's a no-op. Same mbgl-sys
  # asset setup as release-pr so the release command's verify step succeeds.
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'vinayakkulkarni'
    permissions:
      contents: write
      pull-requests: read
      id-token: write # OIDC trusted publishing for crates.io
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install MapLibre Native system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libuv1-dev \
            libpng-dev \
            libicu-dev \
            libjpeg-turbo8-dev \
            libwebp-dev \
            libsqlite3-dev \
            libopengl-dev \
            libgl-dev \
            libgdal-dev

      - name: Download pre-built MapLibre Native binaries
        run: |
          MBGL_VERSION=$(grep '^version' crates/mbgl-sys/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TARGET=x86_64-unknown-linux-gnu
          URL="https://github.com/${{ github.repository }}/releases/download/mbgl-sys-v${MBGL_VERSION}/mbgl-native-${TARGET}.tar.gz"
          echo "Downloading mbgl-sys v${MBGL_VERSION} for ${TARGET}..."

          MAX_RETRIES=5
          DELAY=60
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -fSL "$URL" | tar xz; then
              echo "Download successful"
              echo "MBGL_SYS_LIB_DIR=$(pwd)/lib" >> "$GITHUB_ENV"
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $i/$MAX_RETRIES failed, waiting ${DELAY}s before retry..."
              sleep $DELAY
            fi
          done
          echo "Failed to download native binaries after $MAX_RETRIES attempts"
          exit 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
