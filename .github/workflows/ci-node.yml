name: 'Continuous Integration (Node)'

on:
  workflow_call:

permissions:
  checks: write
  contents: read

jobs:
  ci:
    name: 'Lint & Build'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # --- Client ---
      - name: Lint client
        run: pnpm --filter @tileserver-rs/client run lint

      - name: Build client
        run: |
          ulimit -s unlimited 2>/dev/null || true
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "Build attempt $attempt/$max_attempts..."
            if pnpm --filter @tileserver-rs/client run build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Build failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "Build failed after $max_attempts attempts"
          exit 1

      # --- Docs ---
      - name: Lint docs
        run: pnpm --filter @tileserver-rs/docs run lint

      - name: Build docs
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "Build attempt $attempt/$max_attempts..."
            if pnpm --filter @tileserver-rs/docs run build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Build failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "Build failed after $max_attempts attempts"
          exit 1

      # --- Marketing ---
      - name: Lint marketing
        run: pnpm --filter @tileserver-rs/marketing run lint

      - name: Build marketing
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
            echo "Build attempt $attempt/$max_attempts..."
            if pnpm --filter @tileserver-rs/marketing run build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Build failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "Build failed after $max_attempts attempts"
          exit 1
