version: 2
enable-beta-ecosystems: true
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "00:00"
    assignees:
      - vinayakkulkarni
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  # Cargo (Rust)
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
      time: "00:00"
    assignees:
      - vinayakkulkarni
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  # Bun - Root workspace + all apps (Dependabot ignores Bun's !apps/docs exclusion)
  - package-ecosystem: npm
    versioning-strategy: increase
    directory: "/"
    schedule:
      interval: daily
      time: "00:00"
    assignees:
      - vinayakkulkarni
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

